<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Persembahan untuk Dosen TMTK</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; padding: 0; min-height: 100vh; 
            background-color: #2c3e50;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%2334495e' fill-opacity='0.4'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            font-family: 'Montserrat', sans-serif; color: #333;
            display: flex; justify-content: center; align-items: center;
        }

        /* --- Layar Awal --- */
        #welcome-screen { text-align: center; color: white; animation: fadeIn 1.5s; z-index: 10; }
        .btn-open { 
            margin-top: 30px; padding: 15px 40px; font-size: 1.2em;
            background: #e67e22; color: white; border: none; border-radius: 50px; 
            cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .btn-open:hover { transform: scale(1.1); background: #d35400; }

        /* --- Konten --- */
        #main-content { display: none; width: 90%; max-width: 800px; padding: 20px; animation: slideUp 1s; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        
        /* Galeri Foto Utuh */
        .photo-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin: 30px 0; }
        .photo-item { width: 100%; border-radius: 15px; overflow: hidden; transition: transform 0.4s; }
        .photo-item img { width: 100%; display: block; border-radius: 15px; transition: transform 0.4s; }
        .photo-item:hover { transform: scale(1.03); }
        .photo-item:hover img { transform: scale(1.1); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <h1>Teruntuk Bapak/Ibu Dosen TMTK</h1>
        <p>Sebuah persembahan kecil dari kami...</p>
        <button class="btn-open" onclick="bukaSurat()">Buka Kenangan</button>
    </div>

    <div id="main-content">
        <div class="card">
            <h1>Terima Kasih Banyak</h1>
            <p>Terima kasih atas dedikasi dan kesabaran Bapak/Ibu selama ini. Berikut adalah momen-momen berharga kami:</p>
            
            <div class="photo-grid">
                <div class="photo-item"><img src="foto 1.jpg" alt="Foto 1"></div>
                <div class="photo-item"><img src="foto 2.jpeg" alt="Foto 2"></div>
                <div class="photo-item"><img src="foto 3.jpeg" alt="Foto 3"></div>
            </div>
            
            <p>Semoga Bapak/Ibu selalu sehat dan sukses selalu. Kami pamit untuk melangkah ke babak selanjutnya.</p>
        </div>
    </div>

    <audio id="lagu" src="lagu.mp3" loop></audio>

    <script>
        function bukaSurat() {
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('lagu').play();
        }
    </script>
</body>
</html>
